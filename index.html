<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestión de la Ira</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --primary: #c0392b;
      --primary-dark: #922b21;
      --primary-light: #fadbd8;
      --calm: #2980b9;
      --calm-light: #d6eaf8;
      --calm-dark: #1a5276;
      --success: #27ae60;
      --warn: #e67e22;
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --border: #e0e0e0;
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 16px;
    }

    /* ─── AUTH SCREEN ─── */
    #auth-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #c0392b 0%, #922b21 40%, #2c3e50 100%);
      padding: 24px;
    }
    .auth-box {
      background: white; border-radius: 20px; padding: 40px 32px;
      max-width: 420px; width: 100%; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .auth-logo { font-size: 3.5rem; margin-bottom: 8px; }
    .auth-box h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 6px; }
    .auth-box .auth-sub { font-size: 0.9rem; color: var(--text-light); margin-bottom: 28px; line-height: 1.5; }
    .auth-input {
      width: 100%; border: 2px solid var(--border); border-radius: 10px;
      padding: 14px 16px; font-size: 1rem; font-family: inherit;
      color: var(--text); background: #fafafa; margin-bottom: 14px;
      transition: border-color .2s;
    }
    .auth-input:focus { outline: none; border-color: var(--primary); background: white; }
    .auth-btn {
      width: 100%; background: var(--primary); color: white; border: none;
      border-radius: 10px; padding: 15px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .2s; margin-bottom: 14px;
    }
    .auth-btn:hover { background: var(--primary-dark); }
    .auth-btn:disabled { background: #ccc; cursor: not-allowed; }
    #auth-msg { font-size: 0.88rem; margin-top: 8px; min-height: 20px; }
    #auth-msg.ok { color: var(--success); }
    #auth-msg.err { color: var(--primary); }
    .auth-note { font-size: 0.78rem; color: var(--text-light); margin-top: 12px; line-height: 1.5; }

    /* ─── HEADER ─── */
    header {
      background: linear-gradient(135deg, #c0392b, #922b21);
      color: white; padding: 12px 16px;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      display: flex; align-items: center; gap: 10px;
    }
    .header-icon { font-size: 1.5rem; flex-shrink: 0; }
    .header-info { flex: 1; min-width: 0; }
    header h1 { font-size: 1rem; font-weight: 700; line-height: 1.2; }
    header p { font-size: 0.72rem; opacity: 0.8; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .header-progress { text-align: right; }
    .header-progress span { font-size: 0.72rem; opacity: 0.85; }
    .progress-mini { width: 70px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 3px; margin-top: 3px; }
    .progress-mini-fill { height: 100%; background: #2ecc71; border-radius: 3px; transition: width .5s; }
    .header-btn {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: white; border-radius: 8px; padding: 6px 10px; font-size: 0.75rem;
      font-weight: 600; cursor: pointer; transition: background .2s; white-space: nowrap;
    }
    .header-btn:hover { background: rgba(255,255,255,0.35); }

    /* ─── NAV TABS ─── */
    nav {
      background: white; border-bottom: 1px solid var(--border);
      overflow-x: auto; white-space: nowrap;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      position: sticky; top: 62px; z-index: 100;
    }
    nav::-webkit-scrollbar { display: none; }
    .nav-btn {
      display: inline-block; padding: 11px 13px;
      border: none; background: none;
      color: var(--text-light); font-size: 0.8rem;
      cursor: pointer; border-bottom: 3px solid transparent;
      transition: all .2s; white-space: nowrap;
    }
    .nav-btn:hover { color: var(--primary); }
    .nav-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .nav-btn.done::after { content: ' ✓'; color: var(--success); font-weight: 700; }
    .nav-btn.admin-btn { color: #8e44ad; }
    .nav-btn.admin-btn:hover { color: #6c3483; }
    .nav-btn.admin-btn.active { color: #8e44ad; border-bottom-color: #8e44ad; }

    /* ─── MAIN ─── */
    main { max-width: 760px; margin: 0 auto; padding: 16px; }

    /* ─── CARDS ─── */
    .card {
      background: var(--card); border-radius: var(--radius);
      padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 1.05rem; color: var(--primary); font-weight: 700;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 2px solid var(--primary-light);
      display: flex; align-items: center; gap: 8px;
    }
    .card-title .icon { font-size: 1.2rem; }
    h3 { font-size: 0.95rem; color: var(--primary-dark); margin: 18px 0 8px; font-weight: 700; }
    p { font-size: 0.9rem; line-height: 1.65; margin-bottom: 10px; }
    ul, ol { font-size: 0.9rem; line-height: 1.65; padding-left: 20px; margin-bottom: 10px; }
    li { margin-bottom: 5px; }
    strong { color: var(--primary-dark); }

    /* ─── QUESTION PROMPT ─── */
    .question {
      background: var(--calm-light); border-left: 4px solid var(--calm);
      border-radius: 0 8px 8px 0; padding: 10px 14px;
      margin: 14px 0 6px; font-size: 0.88rem; font-weight: 600;
      color: var(--calm-dark); line-height: 1.5;
    }
    .question::before { content: '✍️  '; }

    /* ─── TEXTAREA / INPUT ─── */
    textarea, input[type="text"], input[type="number"], select {
      width: 100%; border: 1.5px solid var(--border); border-radius: 9px;
      padding: 11px 13px; font-size: 0.9rem; font-family: inherit;
      color: var(--text); background: #fafafa; transition: border-color .2s, background .2s;
    }
    textarea { resize: vertical; min-height: 90px; }
    textarea:focus, input:focus, select:focus {
      outline: none; border-color: var(--calm); background: white;
      box-shadow: 0 0 0 3px rgba(41,128,185,.12);
    }
    label.field-label {
      display: block; font-size: 0.78rem; font-weight: 700;
      color: var(--text-light); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px;
    }
    .field { margin-bottom: 14px; }

    /* ─── BUTTONS ─── */
    .btn {
      border: none; border-radius: 9px; padding: 11px 20px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-calm { background: var(--calm); color: white; }
    .btn-calm:hover { background: var(--calm-dark); transform: translateY(-1px); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }
    .btn-outline:hover { background: var(--primary-light); }
    .btn-purple { background: #8e44ad; color: white; }
    .btn-purple:hover { background: #6c3483; }
    .btn-sm { padding: 7px 14px; font-size: 0.82rem; }
    .btn-block { display: flex; width: 100%; justify-content: center; margin-top: 8px; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }

    /* ─── TAG CHIPS ─── */
    .tag {
      display: inline-block; background: #eafaf1; color: #1e8449;
      border: 1px solid #a9dfbf; border-radius: 20px; padding: 3px 10px;
      font-size: 0.78rem; font-weight: 600;
    }

    /* ─── ANGER METER ─── */
    .meter-wrap {
      background: linear-gradient(135deg, #fdf2f2, #fce8e8);
      border-radius: 12px; padding: 18px; margin: 14px 0; border: 1px solid #f5c6c6;
    }
    .meter-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .meter-title { font-size: 0.85rem; font-weight: 700; color: var(--primary-dark); }
    .meter-val { font-size: 2.2rem; font-weight: 800; min-width: 60px; text-align: center; transition: color .3s; }
    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 8px;
      border-radius: 4px; outline: none; cursor: pointer; border: none; padding: 0;
      background: linear-gradient(to right, #27ae60, #f39c12, #e74c3c);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 28px; height: 28px;
      border-radius: 50%; background: white;
      border: 3px solid var(--primary); cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .meter-desc { text-align: center; font-size: 0.78rem; color: var(--text-light); margin-top: 8px; font-style: italic; }

    /* ─── WEEKLY TRACKER ─── */
    .weekly-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin: 12px 0; }
    .day-cell { text-align: center; }
    .day-lbl { font-size: 0.72rem; font-weight: 700; color: var(--text-light); margin-bottom: 4px; }
    .day-inp {
      width: 100%; border: 1.5px solid var(--border); border-radius: 7px;
      padding: 8px 2px; text-align: center; font-size: 1rem; font-weight: 700;
      background: #fafafa; color: var(--primary-dark);
    }
    .day-inp:focus { outline: none; border-color: var(--primary); background: white; }

    /* ─── ANGER LOG TABLE ─── */
    .log-container { overflow-x: auto; margin-top: 12px; }
    .log-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 500px; }
    .log-table th { background: var(--primary-light); color: var(--primary-dark); padding: 8px 6px; text-align: left; font-size: 0.72rem; white-space: nowrap; }
    .log-table td { padding: 7px 6px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .log-table tr:hover td { background: #fef9f9; }
    .log-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1rem; padding: 0 4px; }
    .log-empty { text-align: center; color: var(--text-light); font-style: italic; padding: 20px; }
    .log-form { background: #fafafa; border-radius: 10px; padding: 16px; margin-top: 12px; border: 1.5px solid var(--border); }
    .log-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ─── BREATHING ─── */
    .breathing-outer { text-align: center; padding: 10px 0; }
    .breathing-circle {
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #5dade2, #1a5276);
      margin: 0 auto 14px; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.9rem; font-weight: 700; text-align: center;
      box-shadow: 0 4px 24px rgba(41,128,185,.45);
      transition: transform 4s ease-in-out; cursor: pointer; user-select: none;
    }
    .breathing-phase { font-size: 1rem; font-weight: 700; color: var(--calm); margin-bottom: 4px; }
    .breathing-count { font-size: 2.5rem; font-weight: 800; color: var(--calm-dark); margin-bottom: 10px; }
    .breathing-msg { font-size: 0.83rem; color: var(--text-light); margin-bottom: 12px; }

    /* ─── ABCD MODEL ─── */
    .abcd-item { display: grid; grid-template-columns: 44px 1fr; gap: 12px; margin-bottom: 14px; align-items: start; }
    .abcd-badge {
      width: 44px; height: 44px; border-radius: 50%; background: var(--primary);
      color: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 800; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(192,57,43,.3);
    }
    .abcd-badge span { font-size: 0.55rem; font-weight: 500; opacity: .8; margin-top: -2px; }

    /* ─── CONFLICT STEPS ─── */
    .conflict-step { display: grid; grid-template-columns: 38px 1fr; gap: 12px; margin-bottom: 16px; align-items: start; }
    .step-badge {
      width: 38px; height: 38px; border-radius: 50%; background: var(--calm);
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 800; flex-shrink: 0;
    }
    .step-label { font-size: 0.83rem; font-weight: 700; color: var(--calm-dark); margin-bottom: 5px; }
    .step-hint { font-size: 0.78rem; color: var(--text-light); margin-bottom: 6px; }

    /* ─── PLAN ─── */
    .plan-strategy {
      display: flex; align-items: center; gap: 8px;
      background: #f8f9fa; border-radius: 8px; padding: 10px 12px;
      margin-bottom: 8px; border: 1.5px solid var(--border);
    }
    .plan-strategy .num {
      width: 28px; height: 28px; border-radius: 50%; background: var(--primary);
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; flex-shrink: 0;
    }
    .plan-strategy input { border: none; background: none; padding: 0; }
    .plan-strategy input:focus { box-shadow: none; outline: none; }

    /* ─── DIVIDER ─── */
    .divider { border: none; border-top: 1.5px dashed var(--border); margin: 20px 0; }

    /* ─── INFO BOXES ─── */
    .info-box {
      border-radius: 10px; padding: 14px 16px; margin: 12px 0;
      font-size: 0.88rem; line-height: 1.6;
    }
    .info-box.warm { background: #fef9e7; border-left: 4px solid #f39c12; color: #7d6608; }
    .info-box.calm { background: var(--calm-light); border-left: 4px solid var(--calm); color: var(--calm-dark); }
    .info-box.red { background: var(--primary-light); border-left: 4px solid var(--primary); color: var(--primary-dark); }
    .info-box.green { background: #eafaf1; border-left: 4px solid var(--success); color: #1e8449; }
    .info-box.purple { background: #f5eef8; border-left: 4px solid #8e44ad; color: #6c3483; }

    /* ─── CYCLE VISUAL ─── */
    .cycle-diagram {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin: 16px 0; flex-wrap: wrap;
    }
    .cycle-phase {
      background: white; border: 2px solid; border-radius: 10px;
      padding: 10px 14px; text-align: center; font-size: 0.8rem; font-weight: 700; min-width: 90px;
    }
    .cycle-phase.accum { border-color: #f39c12; color: #e67e22; }
    .cycle-phase.explo { border-color: var(--primary); color: var(--primary); }
    .cycle-phase.conse { border-color: var(--primary-dark); color: var(--primary-dark); }
    .cycle-arrow { font-size: 1.2rem; color: var(--text-light); }
    .cycle-phase ul { text-align: left; font-size: 0.72rem; font-weight: 400; margin: 4px 0 0 12px; }
    .cycle-phase ul li { margin-bottom: 1px; }

    /* ─── SESSION COMPLETE BANNER ─── */
    .complete-banner {
      background: linear-gradient(135deg, #1e8449, #27ae60);
      color: white; border-radius: 14px; padding: 20px; text-align: center; margin-top: 20px;
    }
    .complete-banner h3 { font-size: 1.1rem; margin-bottom: 6px; color: white; }
    .complete-banner p { color: rgba(255,255,255,.85); font-size: 0.85rem; margin: 0; }

    /* ─── CERTIFICATE ─── */
    .certificate {
      border: 4px double var(--primary); border-radius: 16px;
      padding: 30px; text-align: center; background: linear-gradient(135deg, #fff9f9, #fff);
      margin: 16px 0;
    }
    .certificate .cert-icon { font-size: 3rem; margin-bottom: 10px; }
    .certificate h2 { color: var(--primary); font-size: 1.4rem; margin-bottom: 6px; }
    .certificate .cert-name { font-size: 1.1rem; color: var(--text); margin: 10px 0; }
    .certificate .cert-date { font-size: 0.85rem; color: var(--text-light); margin-top: 14px; }

    /* ─── WELCOME SCREEN ─── */
    .welcome { text-align: center; padding: 30px 16px; }
    .welcome-icon { font-size: 4rem; margin-bottom: 14px; }
    .welcome h2 { font-size: 1.5rem; color: var(--primary); margin-bottom: 10px; }
    .welcome p { font-size: 0.9rem; color: var(--text-light); max-width: 400px; margin: 0 auto 20px; }
    .session-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin-top: 20px; }
    .session-card {
      background: white; border-radius: 12px; padding: 14px 10px;
      text-align: center; cursor: pointer; border: 2px solid var(--border);
      transition: all .2s; box-shadow: var(--shadow);
    }
    .session-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .session-card .s-num { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
    .session-card .s-name { font-size: 0.72rem; color: var(--text-light); margin-top: 4px; line-height: 1.3; }
    .session-card.done { border-color: var(--success); background: #eafaf1; }
    .session-card.done .s-num { color: var(--success); }

    /* ─── ADMIN VIEW ─── */
    .admin-user-card {
      background: white; border-radius: 12px; padding: 16px;
      margin-bottom: 10px; border: 2px solid var(--border);
      display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow);
    }
    .admin-user-card:hover { border-color: #8e44ad; }
    .admin-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #8e44ad, #6c3483);
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700; flex-shrink: 0;
    }
    .admin-user-info { flex: 1; min-width: 0; }
    .admin-user-email { font-weight: 700; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .admin-user-meta { font-size: 0.78rem; color: var(--text-light); margin-top: 2px; }
    .admin-progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin-top: 6px; }
    .admin-progress-fill { height: 100%; background: var(--success); border-radius: 3px; }

    /* ─── REPORT ─── */
    .report-header { background: linear-gradient(135deg, #fdf2f2, #f9f9ff); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
    .report-section { margin-bottom: 20px; border-bottom: 1px dashed var(--border); padding-bottom: 20px; }
    .report-section h4 { font-size: 0.95rem; color: var(--primary); margin-bottom: 10px; font-weight: 700; }
    .report-answer { background: #f8f9fa; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 0.88rem; line-height: 1.6; }
    .report-answer .ra-label { font-size: 0.75rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 4px; }
    .report-answer .ra-value { color: var(--text); }

    /* ─── TOAST ─── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success); color: white;
      padding: 12px 24px; border-radius: 25px;
      font-size: 0.88rem; font-weight: 600; z-index: 9999;
      transition: transform .35s cubic-bezier(.175,.885,.32,1.275);
      pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,.2);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.err { background: var(--primary); }

    /* ─── LOADING ─── */
    .loading { text-align: center; padding: 40px; color: var(--text-light); }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 480px) {
      main { padding: 12px 10px; }
      .log-form-grid { grid-template-columns: 1fr; }
      .session-grid { grid-template-columns: repeat(3,1fr); }
      .auth-box { padding: 28px 20px; }
    }

    /* ─── PRINT ─── */
    @media print {
      #auth-screen, #app-wrapper > header, #app-wrapper > nav,
      .btn, button, .complete-banner, #toast, .no-print { display: none !important; }
      body { background: white; font-size: 12pt; }
      main { max-width: 100%; padding: 0; }
      .card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
      .report-header { border: 2px solid var(--primary); }
      @page { margin: 2cm; }
    }
  </style>
</head>
<body>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">🔥</div>
    <h1>Gestión de la Ira</h1>
    <p class="auth-sub">Programa interactivo de 12 sesiones.<br>Ingresa tu correo para acceder de forma segura.</p>
    <input type="email" class="auth-input" id="auth-email" placeholder="tu@correo.com" autocomplete="email">
    <button class="auth-btn" id="auth-btn" onclick="sendMagicLink()">✉️ Enviar enlace de acceso</button>
    <div id="auth-msg"></div>

async function sendMagicLink() {
  const emailInput = document.getElementById('auth-email');
  const btn = document.getElementById('auth-btn');
  const msg = document.getElementById('auth-msg');
  const email = emailInput.value.trim();

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    msg.className = 'err'; msg.textContent = '⚠️ Ingresa un correo válido.'; return;
  }

  btn.disabled = true; btn.textContent = 'Enviando...';
  msg.className = ''; msg.textContent = '';

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: APP_URL }
  });

  if (error) {
    msg.className = 'err'; msg.textContent = '❌ Error: ' + error.message;
    btn.disabled = false; btn.textContent = '✉️ Enviar enlace de acceso';
  } else {
    msg.className = 'ok';
    msg.innerHTML = `✅ ¡Listo! Revisa tu correo <strong>${email}</strong> y haz clic en el enlace para ingresar.`;
    btn.textContent = '✉️ Reenviar enlace';

  }
}

async function loadStateFromDB() {

    await sb.from('ira_user_state').upsert({

      user_email: currentUser.email,
      state: state,
      updated_at: new Date().toISOString()

  } catch(e) {

      session_key: id,

      completed_at: new Date().toISOString()

function ans(id, val) {
  if (reportState) return; // read-only when viewing another user
  state.answers[id] = val; debouncedSave();
}
function getAns(id) { return getActiveState().answers?.[id] || ''; }

function toast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', isErr);
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

function updateProgress() {
  const n = state.completed.length;
  const ptEl = document.getElementById('progress-text');
  const pbEl = document.getElementById('progress-bar');
  if (ptEl) ptEl.textContent = `${n} / 12`;
  if (pbEl) pbEl.style.width = `${Math.round(n/12*100)}%`;
  ['s1','s2','s3','s4','s5','s6','s78','s910','s11','s12'].forEach(id => {
    const btn = document.getElementById('nav-'+id);
    if(btn) { if(state.completed.includes(id)) btn.classList.add('done'); else btn.classList.remove('done'); }
  });
}

async function markDone(id) {
  if (reportState) return;
  const alreadyDone = state.completed.includes(id);
  if (!alreadyDone) {
    state.completed.push(id);
    debouncedSave();
    await recordCompletedSession(id);
    await notifyCeleste(id);
  }
  toast('✅ ¡Sesión completada!');
  renderSection(currentSection);
}

  const days = ['L','Ma','Mi','J','V','S','D'];

function angerMeter(id, label='Tu nivel de ira ahora mismo') {
  const val = parseInt(getAns(id))||1;
  const descs = ['','Calma total 😌','Muy tranquilo 😊','Tranquilo 🙂','Leve irritación 😐','Molesto 😒','Enojado 😠','Muy enojado 😤','Ira intensa 😡','Casi sin control 🤬','¡Pérdida de control! 💥'];
  const color = val<=3?'#27ae60':val<=6?'#e67e22':'#c0392b';
  if (reportState) {
    return `<div class="report-answer"><div class="ra-label">${label}</div><div class="ra-value" style="color:${color};font-weight:700;font-size:1.1rem">${val}/10 — ${descs[val]}</div></div>`;
  }
  return `<div class="meter-wrap">
    <div class="meter-top"><span class="meter-title">🌡 ${label}</span><span class="meter-val" id="${id}_val" style="color:${color}">${val}</span></div>

    <div class="meter-desc" id="${id}_desc">${descs[val]}</div>
  </div>`;
}

function updateMeter(id, val) {
  const descs = ['','Calma total 😌','Muy tranquilo 😊','Tranquilo 🙂','Leve irritación 😐','Molesto 😒','Enojado 😠','Muy enojado 😤','Ira intensa 😡','Casi sin control 🤬','¡Pérdida de control! 💥'];

  document.getElementById(id+'_val').style.color = color;
  document.getElementById(id+'_desc').textContent = descs[val];
  ans(id, val);

s4: ()=>`
  <div class="card">
    <div class="card-title"><span class="icon">4️⃣</span>Sesión 4 – El ciclo de agresión</div>
    <div class="info-box warm">Aprenderás las tres fases del ciclo de agresión y practicarás la relajación muscular progresiva.</div>

    <h3>Las tres fases del ciclo</h3>
    <div class="cycle-diagram">
      <div class="cycle-phase accum">⚡ ACUMULACIÓN<ul><li>Aumento cardíaco</li><li>Enrojecimiento</li><li>Puños cerrados</li><li>Pensamientos hostiles</li></ul></div>
      <div class="cycle-arrow">→</div>
      <div class="cycle-phase explo">💥 EXPLOSIÓN<ul><li>Agresión verbal</li><li>Conducta destructiva</li><li>Violencia</li></ul></div>
      <div class="cycle-arrow">→</div>
      <div class="cycle-phase conse">🔻 CONSECUENCIAS<ul><li>Pérdida de empleo</li><li>Ruptura familiar</li><li>Prisión</li><li>Culpa, vergüenza</li></ul></div>
    </div>

    <div class="info-box calm">🎯 <strong>Objetivo:</strong> interrumpir el ciclo <em>antes</em> de llegar a la fase de explosión. Usa el medidor de ira para detectar el escalamiento temprano.</div>

    <h3>¿En qué fase estás?</h3>
    <ul>
      <li>Puntuación 1-9 en el medidor = <strong>Fase de acumulación</strong> → Usa tu plan de control</li>
      <li>Puntuación 10 = <strong>Fase de explosión</strong> → Ya hay pérdida de control</li>
    </ul>

    ${angerMeter('s4_meter','¿Cuál fue tu punto más alto esta semana?')}

    <hr class="divider">
    <h3>✍️ Actividades</h3>
    ${qField('s4_fase7','Si alcanzas un 7 en el medidor, ¿en qué fase del ciclo estás? ¿Qué harías?',3)}
    ${qField('s4_interrumpir','¿Cómo puedes interrumpir el ciclo antes de llegar a la explosión?',3)}

    ${reportState ? '' : `<h3>🧘 Ejercicio: Relajación muscular progresiva</h3>
    <div id="pmr-section">
      <div class="info-box calm">
        <p><strong>Instrucciones:</strong> Siéntate cómodamente. Cierra los ojos si lo deseas.</p>
        <ol>
          <li><strong>Manos:</strong> Cierra los puños con fuerza → mantén 5 seg → suelta. Repite.</li>
          <li><strong>Brazos:</strong> Dobla los brazos tensando bíceps → mantén 5 seg → suelta.</li>
          <li><strong>Hombros:</strong> Sube los hombros hacia las orejas → mantén 5 seg → baja suavemente.</li>
          <li><strong>Cuello y rostro:</strong> Haz una mueca tensa → mantén 5 seg → relaja completamente.</li>
          <li>Permanece quieto unos momentos. Observa la diferencia entre tensión y relajación.</li>

        <div class="field"><label class="field-label">Fecha</label>
          <input type="text" id="lf_date" placeholder="ej. Lunes 24/4"></div>

      <div class="field"><label class="field-label">Consecuencias</label>
        <textarea rows="2" id="lf_consequences" placeholder="¿Qué pasó después?"></textarea></div>
      <div class="field"><label class="field-label">Estrategias utilizadas</label>
        <textarea rows="2" id="lf_strategies" placeholder="¿Qué hiciste para manejarlo?"></textarea></div>
      <button class="btn btn-primary" onclick="addLog()">➕ Agregar al registro</button>
    </div>`}
  </div>`;
},

// ── PLAN DE CONTROL ──
plan: ()=>{
  const activeState = getActiveState();
  const plan = activeState.plan||['','','','','',''];
  while(plan.length<6) plan.push('');
  return `<div class="card">
    <div class="card-title"><span class="icon">🛠</span>Mi plan de control de la ira</div>
    <p>Este es tu plan personalizado de estrategias. Puedes usarlo en el momento que sientas que la ira escala.</p>

    <div class="info-box calm">📌 Ejemplo: 1) Pedir una suspensión · 2) Respiración profunda · 3) Llamar a un amigo de confianza · 4) Hacer ejercicio · 5) Usar el modelo A-B-C-D</div>

    <h3>Mis estrategias</h3>
    ${plan.map((s,i)=>reportState
      ? (s ? `<div class="plan-strategy"><div class="num">${i+1}</div><span>${s}</span></div>` : '')
      : `<div class="plan-strategy">
          <div class="num">${i+1}</div>
          <input type="text" value="${s}" placeholder="Estrategia ${i+1}..."
            oninput="updatePlan(${i},this.value)">
        </div>`).join('')}
    ${reportState ? '' : `<button class="btn btn-outline btn-sm" onclick="addPlanRow()" style="margin-top:8px">➕ Agregar estrategia</button>`}

    <hr class="divider">
    <h3>📋 Plan de apoyo social</h3>
    ${qField('plan_apoyo1','Persona 1: ¿A quién pedirías apoyo y cómo te ayudaría?',2)}
    ${qField('plan_apoyo2','Persona 2: ¿A quién pedirías apoyo y cómo te ayudaría?',2)}
    ${qField('plan_apoyo3','Persona 3: ¿A quién pedirías apoyo y cómo te ayudaría?',2)}

    ${reportState ? '' : `<button class="btn btn-success btn-sm" onclick="toast('✅ Plan guardado automáticamente')">💾 Plan guardado</button>`}
  </div>`;
},

// ── REPORTE ──
report: ()=>{
  const activeState = getActiveState();
  const userEmail = reportUserEmail || currentUser?.email || '';
  const completedCount = (activeState.completed||[]).length;
  const today = new Date().toLocaleDateString('es', { year:'numeric', month:'long', day:'numeric' });

  const sessionList = Object.entries(SESSION_NAMES).map(([id, name]) => {
    const done = (activeState.completed||[]).includes(id);
    const answers = Object.entries(activeState.answers||{})
      .filter(([k]) => k.startsWith(id + '_') || k.startsWith(id.replace(/\d+$/, '') + id.match(/\d+$/)?.[0] + '_'))
      .filter(([, v]) => v && v.trim());
    return { id, name, done, answers };
  });

  const logEntries = activeState.angerLog || [];
  const planItems = (activeState.plan || []).filter(s => s && s.trim());

  return `<div class="card">
    <div class="card-title"><span class="icon">📄</span>Reporte de progreso</div>

    ${reportState ? `<div class="info-box purple">👀 Viendo reporte de: <strong>${userEmail}</strong></div>` : ''}

    <div class="report-header">
      <p><strong>Usuario:</strong> ${userEmail}</p>
      <p><strong>Sesiones completadas:</strong> ${completedCount} de 12 (${Math.round(completedCount/12*100)}%)</p>
      <p><strong>Generado:</strong> ${today}</p>
      ${activeState.certName ? `<p><strong>Nombre:</strong> ${activeState.certName}</p>` : ''}
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px" class="no-print">
      <button class="btn btn-primary btn-sm" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
      ${reportState ? `<button class="btn btn-outline btn-sm" onclick="exitAdminView()">← Volver a pacientes</button>` : ''}
    </div>

    <h3>✅ Estado de sesiones</h3>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">
      ${Object.entries(SESSION_NAMES).map(([id, name]) =>
        `<span class="tag" style="${(activeState.completed||[]).includes(id) ? 'background:#eafaf1;border-color:#a9dfbf;color:#1e8449' : 'background:#fdf2f2;border-color:#f5c6c6;color:#c0392b'}">
          ${(activeState.completed||[]).includes(id) ? '✅' : '⏳'} ${name.replace(' –',' –')}
        </span>`).join('')}
    </div>

    ${sessionList.map(s => {
      const sAnswers = Object.entries(activeState.answers||{})
        .filter(([k, v]) => k.startsWith(s.id + '_') && v && v.trim());
      if (!s.done && !sAnswers.length) return '';
      return `<div class="report-section">
        <h4>${s.name} ${s.done ? '✅' : '⏳'}</h4>
        ${sAnswers.map(([k, v]) => `<div class="report-answer">
          <div class="ra-label">${k.replace(s.id+'_','').replace(/_/g,' ')}</div>
          <div class="ra-value">${v.replace(/\n/g,'<br>')}</div>
        </div>`).join('')}
      </div>`;
    }).join('')}

    ${logEntries.length ? `<div class="report-section">
      <h4>📋 Registro de ira (${logEntries.length} entradas)</h4>
      ${logEntries.map((e,i) => `<div class="report-answer">
        <div class="ra-label">${e.date || 'Entrada '+(i+1)} — Nivel: ${e.rating}/10</div>
        <div class="ra-value">
          ${e.situation ? `<strong>Situación:</strong> ${e.situation}<br>` : ''}
          ${e.cues ? `<strong>Indicios:</strong> ${e.cues}<br>` : ''}
          ${e.behavior ? `<strong>Conducta:</strong> ${e.behavior}<br>` : ''}
          ${e.consequences ? `<strong>Consecuencias:</strong> ${e.consequences}<br>` : ''}
          ${e.strategies ? `<strong>Estrategias:</strong> ${e.strategies}` : ''}
        </div>
      </div>`).join('')}
    </div>` : ''}

    ${planItems.length ? `<div class="report-section">
      <h4>🛠 Plan de control de ira</h4>
      ${planItems.map((s,i) => `<div class="report-answer"><div class="ra-value">${i+1}. ${s}</div></div>`).join('')}
    </div>` : ''}

    ${completedCount === 12 ? `<div class="certificate" style="margin-top:20px">
      <div class="cert-icon">🏅</div>
      <h2>Certificado de Finalización</h2>
      <p style="color:var(--text-light);font-size:0.85rem">Programa de Gestión de la Ira</p>
      <div class="cert-name">Se certifica que <strong>${activeState.certName || userEmail}</strong></div>
      <p style="font-size:0.85rem;color:var(--text-light)">completó exitosamente el programa de 12 sesiones de<br><strong>Gestión de la Ira</strong></p>
      <div class="cert-date">📅 ${today}</div>
    </div>` : ''}
  </div>`;
},

// ── ADMIN ──
admin: ()=>`
  <div class="card">
    <div class="card-title"><span class="icon">👥</span>Vista de Pacientes</div>
    <div class="info-box purple">Solo visible para Celeste. Los datos son confidenciales.</div>
    <div class="loading"><div class="spinner"></div><br>Cargando pacientes...</div>
  </div>`

}; // end sections

// ═══════════════════════════════════════════════
//  ADMIN LOGIC
// ═══════════════════════════════════════════════
async function loadAdminView() {
  try {
    const [{ data: userStates }, { data: sessions }] = await Promise.all([
      sb.from('ira_user_state').select('*').order('updated_at', { ascending: false }),
      sb.from('ira_completed_sessions').select('user_id, session_key')
    ]);

    if (!userStates || userStates.length === 0) {
      document.getElementById('app').innerHTML = `<div class="card">
        <div class="card-title"><span class="icon">👥</span>Vista de Pacientes</div>
        <div class="info-box purple">Solo visible para Celeste.</div>
        <p style="color:var(--text-light);text-align:center;padding:20px">Aún no hay usuarios registrados.</p>
      </div>`;
      return;
    }

    // Count sessions per user
    const sessionCount = {};
    (sessions||[]).forEach(s => { sessionCount[s.user_id] = (sessionCount[s.user_id]||0) + 1; });

    const cards = userStates.map(u => {
      const n = (u.state?.completed||[]).length;
      const pct = Math.round(n/12*100);
      const initials = u.user_email ? u.user_email[0].toUpperCase() : '?';
      const updated = u.updated_at ? new Date(u.updated_at).toLocaleDateString('es') : '—';
      return `<div class="admin-user-card">
        <div class="admin-avatar">${initials}</div>
        <div class="admin-user-info">
          <div class="admin-user-email">${u.user_email}</div>
          <div class="admin-user-meta">${n}/12 sesiones · Última actividad: ${updated}</div>
          <div class="admin-progress-bar"><div class="admin-progress-fill" style="width:${pct}%"></div></div>
        </div>
        <button class="btn btn-purple btn-sm" onclick="viewUserReport(${JSON.stringify(JSON.stringify(u))})">📄 Ver reporte</button>
      </div>`;
    }).join('');

    document.getElementById('app').innerHTML = `<div class="card">
      <div class="card-title"><span class="icon">👥</span>Pacientes (${userStates.length})</div>
      <div class="info-box purple">Solo visible para Celeste. Los datos son confidenciales.</div>
      ${cards}
    </div>`;
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="card">
      <p style="color:var(--primary)">Error al cargar pacientes: ${e.message}</p>
    </div>`;
  }
}

function viewUserReport(userJsonStr) {
  const userData = JSON.parse(userJsonStr);
  reportState = { ...defaultState(), ...(userData.state || {}) };
  reportUserEmail = userData.user_email;
  document.getElementById('app').innerHTML = sections.report();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function exitAdminView() {
  reportState = null;
  reportUserEmail = null;
  showSection('admin');
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
let currentSection = 'home';
function showSection(id) {
  // Clear report mode when navigating away
  if (id !== 'report') {
    reportState = null;
    reportUserEmail = null;
  }

  currentSection = id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('nav-'+id);
  if(btn) { btn.classList.add('active'); btn.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'}); }

  if (id === 'admin') {
    renderSection(id);
    loadAdminView();
  } else {
    renderSection(id);
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderSection(id) {
  const fn = sections[id];
  document.getElementById('app').innerHTML = fn ? fn() : '<div class="card"><p>Sección no encontrada.</p></div>';
  if(id==='s12' && !reportState) renderCert();
}

// ═══════════════════════════════════════════════
//  LOG CRUD
// ═══════════════════════════════════════════════
function addLog() {
  const entry = {
    date: document.getElementById('lf_date').value,
    situation: document.getElementById('lf_situation').value,
    cues: document.getElementById('lf_cues').value,
    rating: parseInt(document.getElementById('lf_rating').value)||0,
    behavior: document.getElementById('lf_behavior').value,
    consequences: document.getElementById('lf_consequences').value,
    strategies: document.getElementById('lf_strategies').value
  };
  if(!entry.situation && !entry.date) { toast('⚠️ Escribe al menos la situación', true); return; }
  state.angerLog.push(entry); debouncedSave();
  toast('✅ Episodio registrado');
  renderSection('log');
}
function deleteLog(i) {
  if(confirm('¿Eliminar este registro?')) { state.angerLog.splice(i,1); debouncedSave(); renderSection('log'); }
}

// ═══════════════════════════════════════════════
//  PLAN CRUD
// ═══════════════════════════════════════════════
function updatePlan(i, val) { state.plan[i]=val; debouncedSave(); }
function addPlanRow() {
  state.plan.push(''); debouncedSave(); renderSection('plan');
  setTimeout(()=>{
    const inputs = document.querySelectorAll('.plan-strategy input');
    if(inputs.length) inputs[inputs.length-1].focus();
  },100);
}

// ═══════════════════════════════════════════════
//  BREATHING EXERCISE
// ═══════════════════════════════════════════════
const breathPhases=[
  {name:'Inhala',dur:4,scale:1.4,color:'#1a5276'},
  {name:'Mantén',dur:4,scale:1.4,color:'#196f3d'},
  {name:'Exhala',dur:6,scale:1.0,color:'#922b21'},
];
let breathActive=false, breathInterval=null, breathSec=0, breathPhaseIdx=0, breathRounds=0;
function initBreathing() {
  const sec = document.getElementById('breathing-section');
  if (!sec) return;
  sec.innerHTML = `
    <div class="breathing-outer">
      <div class="breathing-phase" id="b-phase">Toca para comenzar</div>
      <div class="breathing-circle" id="b-circle" onclick="toggleBreath()">Toca para<br>empezar</div>
      <div class="breathing-count" id="b-count"></div>
      <div class="breathing-msg" id="b-msg">Respira 3 ciclos completos</div>
      <button class="btn btn-outline btn-sm" onclick="stopBreath()">⏹ Detener</button>
    </div>`;
}
function toggleBreath() { if(!breathActive) startBreath(); else stopBreath(); }
function startBreath() { breathActive=true; breathPhaseIdx=0; breathRounds=0; runBreathPhase(); }
function runBreathPhase() {
  if(!breathActive) return;
  const ph = breathPhases[breathPhaseIdx];
  const circle = document.getElementById('b-circle');
  if(!circle) { breathActive=false; return; }
  circle.style.transform = `scale(${ph.scale})`;
  circle.style.background = `radial-gradient(circle at 40% 40%, #5dade2, ${ph.color})`;
  circle.textContent = ph.name;
  document.getElementById('b-phase').textContent = ph.name;
  breathSec = ph.dur;
  document.getElementById('b-count').textContent = breathSec;
  clearInterval(breathInterval);
  breathInterval = setInterval(()=>{
    breathSec--;
    const cnt = document.getElementById('b-count'); if(cnt) cnt.textContent = breathSec;
    if(breathSec<=0) {
      clearInterval(breathInterval);
      breathPhaseIdx = (breathPhaseIdx+1) % breathPhases.length;
      if(breathPhaseIdx===0) { breathRounds++; const m=document.getElementById('b-msg'); if(m) m.textContent=`Ciclo ${breathRounds} completado 🌿`; }
      setTimeout(runBreathPhase, 200);
    }
  },1000);
}
function stopBreath() {
  breathActive=false; clearInterval(breathInterval);
  const circle = document.getElementById('b-circle');
  if(circle) { circle.style.transform='scale(1)'; circle.textContent='Terminado 🌿'; }
  const p = document.getElementById('b-phase'); if(p) p.textContent='¡Bien hecho!';
  toast('🌿 Ejercicio de respiración completado');
}

// ═══════════════════════════════════════════════
//  PMR EXERCISE
// ═══════════════════════════════════════════════
const pmrSteps = [
  {name:'Manos',inst:'Cierra los puños con fuerza'},
  {name:'Brazos',inst:'Dobla los brazos tensando los bíceps'},
  {name:'Hombros',inst:'Sube los hombros hacia las orejas'},
  {name:'Cuello y rostro',inst:'Haz una mueca tensa'},
  {name:'Cuerpo completo',inst:'Observa tu cuerpo relajado y respira profundo'},
];
let pmrIdx=0, pmrPhase='tense', pmrInterval=null, pmrSec=0;
function startPMR() { pmrIdx=0; pmrPhase='tense'; pmrSec=5; renderPMR(); }
function renderPMR() {
  const el = document.getElementById('pmr-active'); if(!el) return;
  if(pmrIdx>=pmrSteps.length) {
    el.innerHTML=`<div class="info-box green" style="margin-top:12px">✅ <strong>¡Relajación completa!</strong> Observa cómo se sienten tus músculos totalmente relajados.</div>`; return;
  }
  const step = pmrSteps[pmrIdx]; const isTense = pmrPhase==='tense';
  el.innerHTML=`<div class="info-box calm" style="margin-top:12px;text-align:center">
    <div style="font-size:0.8rem;color:var(--text-light);margin-bottom:4px">Paso ${pmrIdx+1} de ${pmrSteps.length}: <strong>${step.name}</strong></div>
    <div style="font-size:1.1rem;font-weight:700;margin:8px 0">${isTense?'💪 '+step.inst:'😌 Suelta y relaja'}</div>
    <div style="font-size:2rem;font-weight:800;color:var(--calm)">${pmrSec}</div>
    <div style="font-size:0.78rem;color:var(--text-light)">${isTense?'Mantén la tensión...':'Libera la tensión...'}</div>
  </div>`;
  clearInterval(pmrInterval);
  pmrInterval = setInterval(()=>{
    pmrSec--;
    const el2=document.getElementById('pmr-active'); if(!el2){clearInterval(pmrInterval);return;}
    const cnt=el2.querySelector('div[style*="font-size:2rem"]'); if(cnt) cnt.textContent=pmrSec;
    if(pmrSec<=0){
      clearInterval(pmrInterval);
      if(pmrPhase==='tense'){pmrPhase='relax';pmrSec=8;}
      else{pmrPhase='tense';pmrIdx++;pmrSec=5;}
      setTimeout(renderPMR,300);
    }
  },1000);
}

// ═══════════════════════════════════════════════

    <div class="cert-icon">🏅</div>
    <h2>Certificado de Finalización</h2>
    <p style="color:var(--text-light);font-size:0.85rem">Programa de Gestión de la Ira</p>

    <div class="cert-date">📅 ${today}</div>
    <button class="btn btn-outline btn-sm no-print" style="margin-top:14px" onclick="window.print()">🖨️ Imprimir certificado</button>

}

// ═══════════════════════════════════════════════
//  AUTH LISTENER — MAIN INIT
// ═══════════════════════════════════════════════
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    await loadStateFromDB();
    showApp();
  } else {
    currentUser = null;
    showAuthScreen();
  }
});
