<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gestión de la Ira</title>
  <style>
    :root {
      --primary: #c0392b;
      --primary-dark: #922b21;
      --primary-light: #fadbd8;
      --calm: #2980b9;
      --calm-light: #d6eaf8;
      --calm-dark: #1a5276;
      --success: #27ae60;
      --warn: #e67e22;
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #2c3e50;
      --text-light: #7f8c8d;
      --border: #e0e0e0;
      --shadow: 0 2px 10px rgba(0,0,0,0.08);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 16px;
    }

    /* ─── HEADER ─── */
    header {
      background: linear-gradient(135deg, #c0392b, #922b21);
      color: white;
      padding: 14px 20px 12px;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      display: flex; align-items: center; gap: 12px;
    }
    .header-icon { font-size: 1.6rem; }
    header h1 { font-size: 1.1rem; font-weight: 700; line-height: 1.2; }
    header p { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
    .header-progress { margin-left: auto; text-align: right; }
    .header-progress span { font-size: 0.75rem; opacity: 0.85; }
    .progress-mini { width: 80px; height: 5px; background: rgba(255,255,255,0.3); border-radius: 3px; margin-top: 3px; }
    .progress-mini-fill { height: 100%; background: #2ecc71; border-radius: 3px; transition: width .5s; }

    /* ─── NAV TABS ─── */
    nav {
      background: white;
      border-bottom: 1px solid var(--border);
      overflow-x: auto; white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; position: sticky; top: 64px; z-index: 100;
    }
    nav::-webkit-scrollbar { display: none; }
    .nav-btn {
      display: inline-block; padding: 11px 14px;
      border: none; background: none;
      color: var(--text-light); font-size: 0.8rem;
      cursor: pointer; border-bottom: 3px solid transparent;
      transition: all .2s; white-space: nowrap; position: relative;
    }
    .nav-btn:hover { color: var(--primary); }
    .nav-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .nav-btn.done::after { content: ' ✓'; color: var(--success); font-weight: 700; }

    /* ─── MAIN ─── */
    main { max-width: 760px; margin: 0 auto; padding: 16px; }

    /* ─── CARDS ─── */
    .card {
      background: var(--card); border-radius: var(--radius);
      padding: 20px; margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 1.05rem; color: var(--primary); font-weight: 700;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 2px solid var(--primary-light);
      display: flex; align-items: center; gap: 8px;
    }
    .card-title .icon { font-size: 1.2rem; }
    h3 { font-size: 0.95rem; color: var(--primary-dark); margin: 18px 0 8px; font-weight: 700; }
    p { font-size: 0.9rem; line-height: 1.65; margin-bottom: 10px; }
    ul, ol { font-size: 0.9rem; line-height: 1.65; padding-left: 20px; margin-bottom: 10px; }
    li { margin-bottom: 5px; }
    strong { color: var(--primary-dark); }

    /* ─── QUESTION PROMPT ─── */
    .question {
      background: var(--calm-light); border-left: 4px solid var(--calm);
      border-radius: 0 8px 8px 0; padding: 10px 14px;
      margin: 14px 0 6px; font-size: 0.88rem; font-weight: 600;
      color: var(--calm-dark); line-height: 1.5;
    }
    .question::before { content: '✍️  '; }

    /* ─── TEXTAREA / INPUT ─── */
    textarea, input[type="text"], input[type="number"], select {
      width: 100%; border: 1.5px solid var(--border); border-radius: 9px;
      padding: 11px 13px; font-size: 0.9rem; font-family: inherit;
      color: var(--text); background: #fafafa; transition: border-color .2s, background .2s;
    }
    textarea { resize: vertical; min-height: 90px; }
    textarea:focus, input:focus, select:focus {
      outline: none; border-color: var(--calm); background: white;
      box-shadow: 0 0 0 3px rgba(41,128,185,.12);
    }
    label.field-label {
      display: block; font-size: 0.78rem; font-weight: 700;
      color: var(--text-light); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px;
    }
    .field { margin-bottom: 14px; }

    /* ─── BUTTONS ─── */
    .btn {
      border: none; border-radius: 9px; padding: 11px 20px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-calm { background: var(--calm); color: white; }
    .btn-calm:hover { background: var(--calm-dark); transform: translateY(-1px); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }
    .btn-outline:hover { background: var(--primary-light); }
    .btn-sm { padding: 7px 14px; font-size: 0.82rem; }
    .btn-block { display: flex; width: 100%; justify-content: center; margin-top: 8px; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }

    /* ─── ANGER METER ─── */
    .meter-wrap {
      background: linear-gradient(135deg, #fdf2f2, #fce8e8);
      border-radius: 12px; padding: 18px; margin: 14px 0;
      border: 1px solid #f5c6c6;
    }
    .meter-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .meter-title { font-size: 0.85rem; font-weight: 700; color: var(--primary-dark); }
    .meter-val {
      font-size: 2.2rem; font-weight: 800;
      min-width: 60px; text-align: center;
      transition: color .3s;
    }
    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 8px;
      border-radius: 4px; outline: none; cursor: pointer; border: none; padding: 0;
      background: linear-gradient(to right, #27ae60, #f39c12, #e74c3c);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 28px; height: 28px;
      border-radius: 50%; background: white;
      border: 3px solid var(--primary); cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .meter-desc { text-align: center; font-size: 0.78rem; color: var(--text-light); margin-top: 8px; font-style: italic; }

    /* ─── WEEKLY TRACKER ─── */
    .weekly-grid {
      display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin: 12px 0;
    }
    .day-cell { text-align: center; }
    .day-lbl { font-size: 0.72rem; font-weight: 700; color: var(--text-light); margin-bottom: 4px; }
    .day-inp {
      width: 100%; border: 1.5px solid var(--border); border-radius: 7px;
      padding: 8px 2px; text-align: center; font-size: 1rem; font-weight: 700;
      background: #fafafa; color: var(--primary-dark);
    }
    .day-inp:focus { outline: none; border-color: var(--primary); background: white; }

    /* ─── ANGER LOG TABLE ─── */
    .log-container { overflow-x: auto; margin-top: 12px; }
    .log-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; min-width: 500px; }
    .log-table th { background: var(--primary-light); color: var(--primary-dark); padding: 8px 6px; text-align: left; font-size: 0.72rem; white-space: nowrap; }
    .log-table td { padding: 7px 6px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .log-table tr:hover td { background: #fef9f9; }
    .log-delete { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1rem; padding: 0 4px; }
    .log-empty { text-align: center; color: var(--text-light); font-style: italic; padding: 20px; }

    /* ─── ADD LOG FORM ─── */
    .log-form { background: #fafafa; border-radius: 10px; padding: 16px; margin-top: 12px; border: 1.5px solid var(--border); }
    .log-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ─── BREATHING EXERCISE ─── */
    .breathing-outer { text-align: center; padding: 10px 0; }
    .breathing-circle {
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #5dade2, #1a5276);
      margin: 0 auto 14px; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.9rem; font-weight: 700; text-align: center;
      box-shadow: 0 4px 24px rgba(41,128,185,.45);
      transition: transform 4s ease-in-out;
      cursor: pointer; user-select: none;
    }
    .breathing-phase { font-size: 1rem; font-weight: 700; color: var(--calm); margin-bottom: 4px; }
    .breathing-count { font-size: 2.5rem; font-weight: 800; color: var(--calm-dark); margin-bottom: 10px; }
    .breathing-msg { font-size: 0.83rem; color: var(--text-light); margin-bottom: 12px; }

    /* ─── ABCD MODEL ─── */
    .abcd-item { display: grid; grid-template-columns: 44px 1fr; gap: 12px; margin-bottom: 14px; align-items: start; }
    .abcd-badge {
      width: 44px; height: 44px; border-radius: 50%; background: var(--primary);
      color: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 800; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(192,57,43,.3);
    }
    .abcd-badge span { font-size: 0.55rem; font-weight: 500; opacity: .8; margin-top: -2px; }

    /* ─── CONFLICT STEPS ─── */
    .conflict-step { display: grid; grid-template-columns: 38px 1fr; gap: 12px; margin-bottom: 16px; align-items: start; }
    .step-badge {
      width: 38px; height: 38px; border-radius: 50%; background: var(--calm);
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 800; flex-shrink: 0;
    }
    .step-label { font-size: 0.83rem; font-weight: 700; color: var(--calm-dark); margin-bottom: 5px; }
    .step-hint { font-size: 0.78rem; color: var(--text-light); margin-bottom: 6px; }

    /* ─── ANGER CONTROL PLAN ─── */
    .plan-strategy {
      display: flex; align-items: center; gap: 8px;
      background: #f8f9fa; border-radius: 8px; padding: 10px 12px;
      margin-bottom: 8px; border: 1.5px solid var(--border);
    }
    .plan-strategy .num {
      width: 28px; height: 28px; border-radius: 50%; background: var(--primary);
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; flex-shrink: 0;
    }
    .plan-strategy input { border: none; background: none; padding: 0; }
    .plan-strategy input:focus { box-shadow: none; outline: none; }

    /* ─── DIVIDER ─── */
    .divider { border: none; border-top: 1.5px dashed var(--border); margin: 20px 0; }

    /* ─── HIGHLIGHT BOX ─── */
    .info-box {
      border-radius: 10px; padding: 14px 16px; margin: 12px 0;
      font-size: 0.88rem; line-height: 1.6;
    }
    .info-box.warm { background: #fef9e7; border-left: 4px solid #f39c12; color: #7d6608; }
    .info-box.calm { background: var(--calm-light); border-left: 4px solid var(--calm); color: var(--calm-dark); }
    .info-box.red { background: var(--primary-light); border-left: 4px solid var(--primary); color: var(--primary-dark); }
    .info-box.green { background: #eafaf1; border-left: 4px solid var(--success); color: #1e8449; }

    /* ─── CYCLE VISUAL ─── */
    .cycle-diagram {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin: 16px 0; flex-wrap: wrap;
    }
    .cycle-phase {
      background: white; border: 2px solid; border-radius: 10px;
      padding: 10px 14px; text-align: center; font-size: 0.8rem; font-weight: 700;
      min-width: 90px;
    }
    .cycle-phase.accum { border-color: #f39c12; color: #e67e22; }
    .cycle-phase.explo { border-color: var(--primary); color: var(--primary); }
    .cycle-phase.conse { border-color: var(--primary-dark); color: var(--primary-dark); }
    .cycle-arrow { font-size: 1.2rem; color: var(--text-light); }
    .cycle-phase ul { text-align: left; font-size: 0.72rem; font-weight: 400; margin: 4px 0 0 12px; }
    .cycle-phase ul li { margin-bottom: 1px; }

    /* ─── SESSION COMPLETE BANNER ─── */
    .complete-banner {
      background: linear-gradient(135deg, #1e8449, #27ae60);
      color: white; border-radius: 14px; padding: 20px;
      text-align: center; margin-top: 20px;
    }
    .complete-banner h3 { font-size: 1.1rem; margin-bottom: 6px; color: white; }
    .complete-banner p { color: rgba(255,255,255,.85); font-size: 0.85rem; margin: 0; }

    /* ─── GRADUATION ─── */
    .certificate {
      border: 4px double var(--primary); border-radius: 16px;
      padding: 30px; text-align: center; background: linear-gradient(135deg, #fff9f9, #fff);
      margin: 16px 0;
    }
    .certificate .cert-icon { font-size: 3rem; margin-bottom: 10px; }
    .certificate h2 { color: var(--primary); font-size: 1.4rem; margin-bottom: 6px; }
    .certificate .cert-name { font-size: 1.1rem; color: var(--text); margin: 10px 0; }
    .certificate .cert-date { font-size: 0.85rem; color: var(--text-light); margin-top: 14px; }

    /* ─── TOAST ─── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--success); color: white;
      padding: 12px 24px; border-radius: 25px;
      font-size: 0.88rem; font-weight: 600; z-index: 9999;
      transition: transform .35s cubic-bezier(.175,.885,.32,1.275);
      pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,.2);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── WELCOME SCREEN ─── */
    .welcome {
      text-align: center; padding: 40px 16px;
    }
    .welcome-icon { font-size: 4rem; margin-bottom: 14px; }
    .welcome h2 { font-size: 1.5rem; color: var(--primary); margin-bottom: 10px; }
    .welcome p { font-size: 0.9rem; color: var(--text-light); max-width: 400px; margin: 0 auto 20px; }
    .session-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin-top: 20px; }
    .session-card {
      background: white; border-radius: 12px; padding: 14px 10px;
      text-align: center; cursor: pointer; border: 2px solid var(--border);
      transition: all .2s; box-shadow: var(--shadow);
    }
    .session-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .session-card .s-num { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
    .session-card .s-name { font-size: 0.72rem; color: var(--text-light); margin-top: 4px; line-height: 1.3; }
    .session-card.done { border-color: var(--success); background: #eafaf1; }
    .session-card.done .s-num { color: var(--success); }

    @media (max-width: 480px) {
      main { padding: 12px 10px; }
      .log-form-grid { grid-template-columns: 1fr; }
      .session-grid { grid-template-columns: repeat(3,1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-icon">🔥</div>
  <div>
    <h1>Gestión de la Ira</h1>
    <p>Libro de actividades interactivo</p>
  </div>
  <div class="header-progress">
    <span id="progress-text">0 / 12 sesiones</span>
    <div class="progress-mini"><div class="progress-mini-fill" id="progress-bar" style="width:0%"></div></div>
  </div>
</header>

<nav id="main-nav">
  <button class="nav-btn active" onclick="showSection('home')" id="nav-home">🏠 Inicio</button>
  <button class="nav-btn" onclick="showSection('s0')" id="nav-s0">Intro</button>
  <button class="nav-btn" onclick="showSection('s1')" id="nav-s1">S1</button>
  <button class="nav-btn" onclick="showSection('s2')" id="nav-s2">S2</button>
  <button class="nav-btn" onclick="showSection('s3')" id="nav-s3">S3</button>
  <button class="nav-btn" onclick="showSection('s4')" id="nav-s4">S4</button>
  <button class="nav-btn" onclick="showSection('s5')" id="nav-s5">S5</button>
  <button class="nav-btn" onclick="showSection('s6')" id="nav-s6">S6</button>
  <button class="nav-btn" onclick="showSection('s78')" id="nav-s78">S7-8</button>
  <button class="nav-btn" onclick="showSection('s910')" id="nav-s910">S9-10</button>
  <button class="nav-btn" onclick="showSection('s11')" id="nav-s11">S11</button>
  <button class="nav-btn" onclick="showSection('s12')" id="nav-s12">S12</button>
  <button class="nav-btn" onclick="showSection('log')" id="nav-log">📋 Registro</button>
  <button class="nav-btn" onclick="showSection('plan')" id="nav-plan">🛠 Plan</button>
</nav>

<main id="app"></main>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
//  STATE & PERSISTENCE
// ═══════════════════════════════════════════════
const KEY = 'ira_app_v2';
let state = {
  completed: [],
  answers: {},
  weekly: {},
  angerLog: [],
  plan: ['','','','','',''],
  abcd: {},
  conflict: {},
  certName: ''
};
function load() {
  try { const d = localStorage.getItem(KEY); if(d) state = {...state, ...JSON.parse(d)}; } catch(e){}
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(state));
  updateProgress();
}
function ans(id, val) { state.answers[id] = val; save(); }
function getAns(id) { return state.answers[id] || ''; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
function updateProgress() {
  const n = state.completed.length;
  document.getElementById('progress-text').textContent = `${n} / 12 sesiones`;
  document.getElementById('progress-bar').style.width = `${Math.round(n/12*100)}%`;
  ['s1','s2','s3','s4','s5','s6','s78','s910','s11','s12'].forEach(id => {
    const btn = document.getElementById('nav-'+id);
    if(btn) { if(state.completed.includes(id)) btn.classList.add('done'); else btn.classList.remove('done'); }
  });
}
function markDone(id) {
  if(!state.completed.includes(id)) state.completed.push(id);
  save(); toast('✅ Sesión marcada como completada');
  renderSection(currentSection);
}

// ═══════════════════════════════════════════════
//  COMPONENTS
// ═══════════════════════════════════════════════
function qField(id, prompt, rows=3) {
  return `<div class="question">${prompt}</div>
    <div class="field"><textarea rows="${rows}" id="${id}" placeholder="Escribe aquí..."
      oninput="ans('${id}',this.value)">${getAns(id)}</textarea></div>`;
}
function saveBtn(msg='💾 Guardar respuestas') {
  return `<button class="btn btn-calm btn-sm" onclick="toast('✅ Guardado automáticamente')">${msg}</button>`;
}
function weeklyTracker(sid) {
  const days = ['L','Ma','Mi','J','V','S','D'];
  const vals = state.weekly[sid] || {};
  return `<div class="info-box warm">📅 Para cada día de esta semana, registra el número más alto que alcanzas en el medidor de ira:</div>
  <div class="weekly-grid">${days.map(d=>`<div class="day-cell">
    <div class="day-lbl">${d}</div>
    <input type="number" class="day-inp" min="1" max="10" value="${vals[d]||''}"
      oninput="saveWeekly('${sid}','${d}',this.value)" placeholder="—">
  </div>`).join('')}</div>`;
}
function saveWeekly(sid,day,val) {
  if(!state.weekly[sid]) state.weekly[sid]={};
  state.weekly[sid][day]=val; save();
}
function weeklyReview(sid) {
  const fields = ['físicos','conductuales','emocionales','cognitivos'];
  return `<hr class="divider">
  <h3>📊 Supervisión de la ira – semana anterior</h3>
  ${qField(sid+'_rev_evento','¿Cuál fue el número más alto en el medidor de ira? ¿Qué evento lo condujo a la ira?',2)}
  <div class="log-form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
  ${fields.map(f=>`<div class="field"><label class="field-label">Indicios ${f}</label>
    <textarea rows="2" id="${sid}_ind_${f}" placeholder="..."
      oninput="ans('${sid}_ind_${f}',this.value)">${getAns(sid+'_ind_'+f)}</textarea></div>`).join('')}
  </div>
  ${qField(sid+'_estrategias','¿Qué estrategias usaste para evitar llegar a 10?',2)}
  ${weeklyTracker(sid)}`;
}
function completeBtn(id, label='Marcar sesión como completada') {
  const done = state.completed.includes(id);
  if(done) return `<div class="complete-banner"><h3>🎉 ¡Sesión completada!</h3><p>Has terminado esta sesión. Puedes volver a editarla en cualquier momento.</p></div>`;
  return `<button class="btn btn-success btn-block complete-btn" onclick="markDone('${id}')">✅ ${label}</button>`;
}

// ═══════════════════════════════════════════════
//  ANGER METER COMPONENT
// ═══════════════════════════════════════════════
function angerMeter(id, label='Tu nivel de ira ahora mismo') {
  const val = parseInt(getAns(id))||1;
  const descs = ['','Calma total 😌','Muy tranquilo 😊','Tranquilo 🙂','Leve irritación 😐','Molesto 😒','Enojado 😠','Muy enojado 😤','Ira intensa 😡','Casi sin control 🤬','¡Pérdida de control! 💥'];
  const color = val<=3?'#27ae60':val<=6?'#e67e22':'#c0392b';
  return `<div class="meter-wrap">
    <div class="meter-top"><span class="meter-title">🌡 ${label}</span><span class="meter-val" id="${id}_val" style="color:${color}">${val}</span></div>
    <input type="range" min="1" max="10" value="${val}" id="${id}_range"
      oninput="updateMeter('${id}',this.value)">
    <div class="meter-desc" id="${id}_desc">${descs[val]}</div>
  </div>`;
}
function updateMeter(id, val) {
  const descs = ['','Calma total 😌','Muy tranquilo 😊','Tranquilo 🙂','Leve irritación 😐','Molesto 😒','Enojado 😠','Muy enojado 😤','Ira intensa 😡','Casi sin control 🤬','¡Pérdida de control! 💥'];
  const color = val<=3?'#27ae60':val<=6?'#e67e22':'#c0392b';
  document.getElementById(id+'_val').textContent = val;
  document.getElementById(id+'_val').style.color = color;
  document.getElementById(id+'_desc').textContent = descs[val];
  ans(id, val);
}

// ═══════════════════════════════════════════════
//  BREATHING EXERCISE
// ═══════════════════════════════════════════════
let breathTimer=null, breathPhase=0, breathCount=0;
const breathPhases=[
  {name:'Inhala',dur:4,scale:1.4,color:'#1a5276'},
  {name:'Mantén',dur:4,scale:1.4,color:'#196f3d'},
  {name:'Exhala',dur:6,scale:1.0,color:'#922b21'},
];
let breathCycle=0, breathRound=0;
function initBreathing() {
  const sec = document.getElementById('breathing-section');
  sec.innerHTML = `
    <div class="breathing-outer">
      <div class="breathing-phase" id="b-phase">Toca para comenzar</div>
      <div class="breathing-circle" id="b-circle" onclick="toggleBreath()">Toca para<br>empezar</div>
      <div class="breathing-count" id="b-count"></div>
      <div class="breathing-msg" id="b-msg">Respira 3 ciclos completos</div>
      <button class="btn btn-outline btn-sm" onclick="stopBreath()">⏹ Detener</button>
    </div>`;
}
let breathActive=false, breathInterval=null, breathSec=0, breathPhaseIdx=0, breathRounds=0;
function toggleBreath() {
  if(!breathActive) startBreath(); else stopBreath();
}
function startBreath() {
  breathActive=true; breathPhaseIdx=0; breathRounds=0; runBreathPhase();
}
function runBreathPhase() {
  if(!breathActive) return;
  const ph = breathPhases[breathPhaseIdx];
  const circle = document.getElementById('b-circle');
  const phaseEl = document.getElementById('b-phase');
  const countEl = document.getElementById('b-count');
  const msgEl = document.getElementById('b-msg');
  if(!circle) return;
  circle.style.transform = `scale(${ph.scale})`;
  circle.style.background = `radial-gradient(circle at 40% 40%, #5dade2, ${ph.color})`;
  circle.textContent = ph.name;
  phaseEl.textContent = ph.name;
  breathSec = ph.dur;
  countEl.textContent = breathSec;
  clearInterval(breathInterval);
  breathInterval = setInterval(()=>{
    breathSec--;
    if(countEl) countEl.textContent = breathSec;
    if(breathSec<=0) {
      clearInterval(breathInterval);
      breathPhaseIdx = (breathPhaseIdx+1) % breathPhases.length;
      if(breathPhaseIdx===0) {
        breathRounds++;
        if(msgEl) msgEl.textContent = `Ciclo ${breathRounds} completado 🌿`;
      }
      setTimeout(runBreathPhase, 200);
    }
  },1000);
}
function stopBreath() {
  breathActive=false; clearInterval(breathInterval);
  const circle = document.getElementById('b-circle');
  if(circle) { circle.style.transform='scale(1)'; circle.textContent='Terminado 🌿'; }
  const phaseEl = document.getElementById('b-phase');
  if(phaseEl) phaseEl.textContent = '¡Bien hecho!';
  toast('🌿 Ejercicio de respiración completado');
}

// ═══════════════════════════════════════════════
//  PMR EXERCISE
// ═══════════════════════════════════════════════
const pmrSteps = [
  {name:'Manos',inst:'Cierra los puños con fuerza'},
  {name:'Brazos',inst:'Dobla los brazos tensando los bíceps'},
  {name:'Hombros',inst:'Sube los hombros hacia las orejas'},
  {name:'Cuello y rostro',inst:'Haz una mueca tensa'},
  {name:'Cuerpo completo',inst:'Observa tu cuerpo relajado y respira profundo'},
];
let pmrIdx=0, pmrPhase='tense', pmrInterval=null, pmrSec=0;
function startPMR() {
  pmrIdx=0; pmrPhase='tense'; pmrSec=5;
  renderPMR();
}
function renderPMR() {
  const el = document.getElementById('pmr-active');
  if(!el) return;
  if(pmrIdx>=pmrSteps.length) {
    el.innerHTML=`<div class="info-box green" style="margin-top:12px">✅ <strong>¡Relajación completa!</strong> Observa cómo se sienten tus músculos totalmente relajados.</div>`;
    return;
  }
  const step = pmrSteps[pmrIdx];
  const isTense = pmrPhase==='tense';
  el.innerHTML=`<div class="info-box calm" style="margin-top:12px;text-align:center">
    <div style="font-size:0.8rem;color:var(--text-light);margin-bottom:4px">Paso ${pmrIdx+1} de ${pmrSteps.length}: <strong>${step.name}</strong></div>
    <div style="font-size:1.1rem;font-weight:700;margin:8px 0">${isTense?'💪 '+step.inst:'😌 Suelta y relaja'}</div>
    <div style="font-size:2rem;font-weight:800;color:var(--calm)">${pmrSec}</div>
    <div style="font-size:0.78rem;color:var(--text-light)">${isTense?'Mantén la tensión...':'Libera la tensión...'}</div>
  </div>`;
  clearInterval(pmrInterval);
  pmrInterval = setInterval(()=>{
    pmrSec--;
    const el2 = document.getElementById('pmr-active');
    if(!el2) { clearInterval(pmrInterval); return; }
    const cnt = el2.querySelector('div[style*="font-size:2rem"]');
    if(cnt) cnt.textContent = pmrSec;
    if(pmrSec<=0) {
      clearInterval(pmrInterval);
      if(pmrPhase==='tense') { pmrPhase='relax'; pmrSec=8; }
      else { pmrPhase='tense'; pmrIdx++; pmrSec=5; }
      setTimeout(renderPMR, 300);
    }
  },1000);
}
